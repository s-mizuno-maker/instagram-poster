<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モノ道楽 Instagram投稿管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
.header { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 500; }
.container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
.filters { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.filters select, .filters input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.product-card { background: white; border-radius: 10px; overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
.product-card.selected { border-color: #0071e3; }
.product-card.posted { opacity: 0.5; }
.product-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; }
.product-info { padding: 10px 12px; }
.product-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.product-meta { font-size: 12px; color: #888; }
.badge { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.badge-new { background: #e8f5e9; color: #2e7d32; }
.badge-posted { background: #eee; color: #888; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eee; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
.selected-count { font-size: 14px; color: #666; }
.btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
.btn-primary { background: #0071e3; color: white; margin-left: auto; }
.btn-secondary { background: #f0f0f0; color: #333; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: white; border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.img-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.img-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; cursor: pointer; }
.img-thumb.selected { border-color: #0071e3; }
.caption-box { width: 100%; height: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; line-height: 1.7; resize: vertical; }
.modal-actions { display: flex; gap: 8px; margin-top: 1rem; }
.loading { text-align: center; padding: 2rem; color: #888; }
</style>
</head>
<body>
<div class="header">
  <h1>モノ道楽 Instagram投稿管理</h1>
  <span id="header-count">商品を読み込み中...</span>
</div>
<div class="container">
  <div class="filters">
    <input type="text" id="search" placeholder="商品名で検索..." oninput="filterProducts()">
    <select id="status-filter" onchange="filterProducts()">
      <option value="all">すべて</option>
      <option value="unposted">未投稿のみ</option>
      <option value="posted">投稿済み</option>
    </select>
  </div>
  <div class="product-grid" id="product-grid">
    <div class="loading">商品を読み込み中...</div>
  </div>
</div>
<div class="bottom-bar">
  <span class="selected-count" id="selected-count">0件選択中</span>
  <button class="btn btn-secondary" onclick="clearSelection()">選択解除</button>
  <button class="btn btn-primary" onclick="openModal()">投稿設定を開く</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">投稿設定</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-secondary" onclick="generateCaption()">AIでキャプション生成</button>
      <button class="btn btn-primary" onclick="postNow()">投稿する</button>
    </div>
  </div>
</div>

<script>
let allProducts = [];
let selectedProduct = null;
let selectedImages = [];

async function loadProducts() {
  const res = await fetch('/api/products');
  allProducts = await res.json();
  document.getElementById('header-count').textContent = `全${allProducts.length}件`;
  renderProducts(allProducts);
}

function renderProducts(products) {
  const grid = document.getElementById('product-grid');
  if (products.length === 0) { grid.innerHTML = '<div class="loading">商品が見つかりません</div>'; return; }
  grid.innerHTML = products.map(p => `
    <div class="product-card ${p.posted ? 'posted' : ''}" onclick="selectProduct('${p.id}')">
      <img class="product-img" src="${p.images[0] || ''}" onerror="this.style.background='#eee'">
      <div class="product-info">
        <div class="product-title">${p.title}<span class="badge ${p.posted ? 'badge-posted' : 'badge-new'}">${p.posted ? '投稿済み' : '未投稿'}</span></div>
        <div class="product-meta">${p.vendor}</div>
      </div>
    </div>
  `).join('');
}

function filterProducts() {
  const search = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('status-filter').value;
  const filtered = allProducts.filter(p => {
    const matchSearch = p.title.toLowerCase().includes(search);
    const matchStatus = status === 'all' || (status === 'unposted' && !p.posted) || (status === 'posted' && p.posted);
    return matchSearch && matchStatus;
  });
  renderProducts(filtered);
}

function selectProduct(id) {
  selectedProduct = allProducts.find(p => p.id === id);
  document.querySelectorAll('.product-card').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('selected-count').textContent = '1件選択中';
}

function clearSelection() {
  selectedProduct = null;
  document.querySelectorAll('.product-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('selected-count').textContent = '0件選択中';
}

function openModal() {
  if (!selectedProduct) { alert('商品を選択してください'); return; }
  selectedImages = selectedProduct.images.slice(0, 3);
  document.getElementById('modal-title').textContent = selectedProduct.title;
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:13px;color:#888;margin-bottom:8px;">投稿する画像を選択（クリックで選択・解除）</p>
    <div class="img-grid">${selectedProduct.images.map((url, i) => `
      <img class="img-thumb ${i < 3 ? 'selected' : ''}" src="${url}" onclick="toggleImage(this, '${url}')">
    `).join('')}</div>
    <p style="font-size:13px;color:#888;margin-bottom:8px;">キャプション</p>
    <textarea class="caption-box" id="caption-box" placeholder="「AIでキャプション生成」ボタンを押すか、直接入力してください"></textarea>
  `;
  document.getElementById('modal').classList.add('active');
}

function toggleImage(el, url) {
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    selectedImages = selectedImages.filter(u => u !== url);
  } else {
    el.classList.add('selected');
    selectedImages.push(url);
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

async function generateCaption() {
  const box = document.getElementById('caption-box');
  box.value = 'AIがキャプションを生成中...';
  const res = await fetch('/api/generate_caption', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(selectedProduct)
  });
  const data = await res.json();
  box.value = data.caption;
}

async function postNow() {
  const caption = document.getElementById('caption-box').value;
  if (!caption) { alert('キャプションを入力してください'); return; }
  if (selectedImages.length === 0) { alert('画像を選択してください'); return; }
  if (!confirm('投稿してもよいですか？')) return;
  
  const res = await fetch('/api/post', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      product_id: selectedProduct.id,
      image_urls: selectedImages,
      caption: caption
    })
  });
  const data = await res.json();
  if (data.success) {
    alert('投稿しました！');
    closeModal();
    loadProducts();
  } else {
    alert('エラー: ' + data.error);
  }
}

loadProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モノ道楽 リール動画生成</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
.header { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 500; }
.header a { font-size: 13px; color: #0071e3; text-decoration: none; }
.container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem 100px; }
.step-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #eee; display: none; }
.step-card.active { display: block; }
#step-1 { display: block; }
.step-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; margin-bottom: 6px; }
.step-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
.filters { display: flex; gap: 8px; margin-bottom: 1rem; }
.filters input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; }
.product-card { background: #fafafa; border-radius: 8px; overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
.product-card:hover { border-color: #ccc; }
.product-card.selected { border-color: #0071e3; }
.product-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; }
.product-info { padding: 8px 10px; }
.product-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-meta { font-size: 11px; color: #aaa; }
.img-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.img-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; cursor: pointer; position: relative; flex-shrink: 0; }
.img-thumb.selected { border-color: #0071e3; }
.img-thumb:not(.selected) { opacity: 0.4; }
.img-order { position: absolute; top: 3px; left: 3px; background: #0071e3; color: white; font-size: 10px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.img-count { font-size: 12px; color: #888; margin-top: 8px; }
.caption-box { width: 100%; height: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; line-height: 1.8; resize: vertical; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.schedule-section { margin-top: 1rem; padding: 12px; background: #f5f5f5; border-radius: 8px; }
.schedule-section label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
.schedule-toggle { display: flex; gap: 8px; margin-bottom: 8px; }
.schedule-toggle button { padding: 6px 16px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; background: white; }
.schedule-toggle button.active { background: #0071e3; color: white; border-color: #0071e3; }
.datetime-input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; display: none; }
.datetime-input.show { display: block; }
.btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
.btn-primary { background: #0071e3; color: white; }
.btn-primary:hover { background: #005bb5; }
.btn-secondary { background: #f0f0f0; color: #333; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eee; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; z-index: 50; }
.selected-info { font-size: 14px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%; }
#log { background: #1a1a1a; color: #aaa; border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 12px; line-height: 1.8; white-space: pre-wrap; margin-top: 1rem; display: none; }
#log.active { display: block; }
.log-ok { color: #6ee7b7; }
.log-err { color: #f87171; }
.video-preview { max-width: 300px; border-radius: 12px; display: block; margin: 0 auto; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #0071e3; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 2rem; color: #888; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <h1>モノ道楽 リール動画生成</h1>
  <a href="/">← 投稿管理に戻る</a>
</div>
<div class="container">
  <div class="step-card active" id="step-1">
    <div class="step-label">Step 1</div>
    <h2>商品を選ぶ</h2>
    <div class="filters">
      <input type="text" id="search" placeholder="商品名・SKU・ブランドで検索..." oninput="filterProducts()">
    </div>
    <div class="product-grid" id="product-grid">
      <div class="loading">商品を読み込み中...</div>
    </div>
  </div>
  <div class="step-card" id="step-2">
    <div class="step-label">Step 2</div>
    <h2>使う画像を選ぶ <span style="font-size:12px;color:#aaa;font-weight:400">クリックで選択</span></h2>
    <div class="img-grid" id="img-grid"></div>
    <div class="img-count" id="img-count"></div>
  </div>
  <div class="step-card" id="step-3">
    <div class="step-label">Step 3</div>
    <h2>キャッチコピー</h2>
    <textarea class="caption-box" id="catchcopy" placeholder="「AIで生成」ボタンを押すか、直接入力してください"></textarea>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-gen-catch" onclick="generateCatch()">✦ AIで生成</button>
      <button class="btn btn-secondary" onclick="document.getElementById('catchcopy').value=''">クリア</button>
    </div>
  </div>
  <div class="step-card" id="step-4">
    <div class="step-label">Step 4</div>
    <h2>投稿スケジュール</h2>
    <div class="schedule-section">
      <label>投稿タイミング</label>
      <div class="schedule-toggle">
        <button class="active" id="btn-now" onclick="setScheduleMode('now')">1時間後</button>
        <button id="btn-schedule" onclick="setScheduleMode('schedule')">時間を指定</button>
      </div>
      <input type="datetime-local" class="datetime-input" id="scheduled-time">
    </div>
  </div>
  <div id="log"></div>
  <div class="step-card" id="result-section">
    <div class="step-label">完成</div>
    <h2>動画が生成されました 🎉</h2>
    <div style="text-align:center;margin:1rem 0;">
      <video id="video-preview" class="video-preview" controls playsinline style="max-width:320px;max-height:560px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);"></video>
    </div>
    <p id="video-url" style="font-size:11px;color:#aaa;margin-top:8px;word-break:break-all;text-align:center;"></p>
    <div style="text-align:center;margin-top:12px;">
      <a id="video-dl" href="#" target="_blank" class="btn btn-secondary" style="display:inline-block;text-decoration:none;">↗ Cloudinaryで開く</a>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <span class="selected-info" id="selected-info">商品を選択してください</span>
  <button class="btn btn-secondary" onclick="clearSelection()" style="margin-left:auto;">選択解除</button>
  <button class="btn btn-primary" id="btn-generate" onclick="generateReel()" disabled>動画を生成する</button>
</div>
<script>
let allProducts = [];
let selectedProduct = null;
let selectedImages = [];
let scheduleMode = 'now';

async function loadProducts() {
  const res = await fetch('/api/products');
  allProducts = await res.json();
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q
    ? allProducts.filter(p =>
        p.title.toLowerCase().includes(q) ||
        (p.vendor||'').toLowerCase().includes(q) ||
        (p.sku||'').toLowerCase().includes(q))
    : allProducts;
  renderProducts(filtered.slice(0, 60));
}

function renderProducts(products) {
  const grid = document.getElementById('product-grid');
  if (!products.length) { grid.innerHTML = '<div class="loading">該当なし</div>'; return; }
  grid.innerHTML = products.map(p => `
    <div class="product-card ${selectedProduct?.id === p.id ? 'selected' : ''}" onclick="selectProduct('${p.id}')">
      <img class="product-img" src="${p.images[0]||''}" loading="lazy" onerror="this.style.background='#eee'">
      <div class="product-info">
        <div class="product-title">${p.title}</div>
        <div class="product-meta">${p.product_type||''} · 画像${p.images.length}枚${p.sku ? ` · ${p.sku}` : ''}</div>
      </div>
    </div>
  `).join('');
}

function selectProduct(id) {
  selectedProduct = allProducts.find(p => p.id === id);
  selectedImages = [];
  filterProducts();
  renderImageGrid();
  ['step-2','step-3','step-4'].forEach(s => document.getElementById(s).classList.add('active'));
  document.getElementById('catchcopy').value = '';
  document.getElementById('selected-info').textContent = selectedProduct.title.slice(0, 40);
  document.getElementById('btn-generate').disabled = false;
  document.getElementById('step-2').scrollIntoView({behavior: 'smooth'});
}

function clearSelection() {
  selectedProduct = null;
  selectedImages = [];
  filterProducts();
  ['step-2','step-3','step-4'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById('selected-info').textContent = '商品を選択してください';
  document.getElementById('btn-generate').disabled = true;
}

function renderImageGrid() {
  const grid = document.getElementById('img-grid');
  if (!selectedProduct) return;
  grid.innerHTML = selectedProduct.images.map((url, i) => {
    const selIdx = selectedImages.indexOf(url);
    const isSel = selIdx !== -1;
    return `
      <div style="position:relative;display:inline-block;" onclick="toggleImage('${url}')">
        <img class="img-thumb ${isSel ? 'selected' : ''}" src="${url}" loading="lazy">
        ${isSel ? `<div class="img-order">${selIdx+1}</div>` : ''}
      </div>`;
  }).join('');
  document.getElementById('img-count').textContent =
    selectedImages.length ? `${selectedImages.length}枚選択中` : '画像をクリックして選択してください';
}

function toggleImage(url) {
  const idx = selectedImages.indexOf(url);
  if (idx !== -1) selectedImages.splice(idx, 1);
  else selectedImages.push(url);
  renderImageGrid();
}

function setScheduleMode(mode) {
  scheduleMode = mode;
  document.getElementById('btn-now').classList.toggle('active', mode === 'now');
  document.getElementById('btn-schedule').classList.toggle('active', mode === 'schedule');
  document.getElementById('scheduled-time').classList.toggle('show', mode === 'schedule');
}

async function generateCatch() {
  if (!selectedProduct) return;
  const btn = document.getElementById('btn-gen-catch');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>生成中…';
  try {
    const res = await fetch('/api/reel/generate_catch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({product: selectedProduct})
    });
    const data = await res.json();
    document.getElementById('catchcopy').value = data.catchcopy || '';
  } catch(e) { alert('生成に失敗しました'); }
  btn.disabled = false;
  btn.innerHTML = '✦ AIで生成';
}

async function generateReel() {
  if (!selectedProduct) { alert('商品を選んでください'); return; }
  if (selectedImages.length === 0) { alert('画像を選んでください'); return; }
  const catchcopy = document.getElementById('catchcopy').value.trim();
  if (!catchcopy) { alert('キャッチコピーを入力または生成してください'); return; }
  let scheduledTime = null;
  if (scheduleMode === 'schedule') {
    scheduledTime = document.getElementById('scheduled-time').value;
    if (!scheduledTime) { alert('投稿時間を選択してください'); return; }
    scheduledTime = new Date(scheduledTime).toISOString();
  }
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>生成中…';
  const log = document.getElementById('log');
  log.className = 'active';
  log.innerHTML = '動画生成を開始します…\n';
  document.getElementById('result-section').classList.remove('active');
  try {
    const res = await fetch('/api/reel/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ product: selectedProduct, image_urls: selectedImages, catchcopy, scheduled_time: scheduledTime })
    });
    const data = await res.json();
    if (data.success) {
      log.innerHTML += '<span class="log-ok">✓ 動画生成完了\n✓ Cloudinaryアップロード完了\n✓ Supabase登録完了</span>';
      document.getElementById('result-section').classList.add('active');
      document.getElementById('video-preview').src = data.video_url;
      document.getElementById('video-url').textContent = data.video_url;
      document.getElementById('video-dl').href = data.video_url;
      document.getElementById('result-section').scrollIntoView({behavior:'smooth'});
    } else {
      log.innerHTML += `<span class="log-err">エラー: ${data.error}</span>`;
    }
  } catch(e) {
    log.innerHTML += `<span class="log-err">通信エラー: ${e}</span>`;
  }
  btn.disabled = false;
  btn.innerHTML = '動画を生成する';
}

loadProducts();
</script>
</body>
</html>
